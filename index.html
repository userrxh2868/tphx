<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>图像混淆工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden;height:100%}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--srf);color:var(--on-srf);line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100dvh;transition:background .3s,color .3s}
header.topbar{flex-shrink:0;background:var(--srf-c);padding:20px 24px 16px;position:relative;z-index:20;transition:background .3s}
header.topbar h1{font-size:22px;font-weight:700;letter-spacing:-.01em;color:var(--on-srf)}
header.topbar .sub{font-size:13px;color:var(--on-srf-v);margin-top:2px}
.topbar-actions{position:absolute;top:18px;right:16px;display:flex;gap:6px}
.ibtn{width:40px;height:40px;border:none;border-radius:20px;background:transparent;color:var(--on-srf-v);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:background .15s}
.ibtn:hover{background:var(--st-l)}.ibtn:active{background:var(--st-h)}
.cpanel{position:absolute;top:calc(100% + 4px);right:12px;background:var(--srf-cl);border:1px solid var(--out-v);border-radius:16px;padding:14px;box-shadow:0 4px 24px rgba(0,0,0,.12);display:flex;gap:10px;opacity:0;transform:translateY(-6px) scale(.96);pointer-events:none;transition:all .22s cubic-bezier(.2,0,0,1);z-index:30}
.cpanel.open{opacity:1;transform:none;pointer-events:auto}
.cdot{width:32px;height:32px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:all .15s}
.cdot:active{transform:scale(.85)}
.cdot.on{border-color:var(--on-srf);box-shadow:0 0 0 2px var(--srf-cl),0 0 0 4px var(--on-srf)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 16px 100px}
.card{background:var(--srf-cl);border-radius:12px;padding:16px;margin-bottom:8px;transition:background .3s;animation:ci .4s cubic-bezier(.2,0,0,1) both}
.card:nth-child(2){animation-delay:.03s}.card:nth-child(3){animation-delay:.06s}.card:nth-child(4){animation-delay:.09s}
@keyframes ci{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.ct{font-size:14px;font-weight:600;color:var(--on-srf);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ct i{color:var(--pri);font-size:15px}
.upl{border:1px solid var(--out-v);border-radius:12px;padding:32px 16px;text-align:center;cursor:pointer;color:var(--on-srf-v);font-size:13px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.upl.idle{animation:bp 3s ease-in-out infinite}
@keyframes bp{0%,100%{border-color:var(--out-v)}50%{border-color:var(--pri)}}
.upl:hover{background:var(--st-l)}.upl:active,.upl.over{border-color:var(--pri);background:var(--st-h)}
.upl input{display:none}
.upl .ico{font-size:28px;color:var(--out);margin-bottom:8px;transition:color .25s}
.upl:hover .ico{color:var(--pri)}
.upl .nm{color:var(--on-srf);font-weight:500;font-size:14px;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;display:block}
.upl .sb{font-size:11px;color:var(--on-srf-v);margin-top:2px}
.field{margin-bottom:16px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:500;color:var(--on-srf-v);margin-bottom:6px;padding-left:12px}
.field select,.field input[type=text],.field input[type=password]{width:100%;padding:14px 16px;border:1px solid var(--out);border-radius:4px;font-family:inherit;font-size:14px;background:transparent;color:var(--on-srf);outline:none;appearance:none;-webkit-appearance:none;transition:border-color .2s;-webkit-tap-highlight-color:transparent}
.field select:focus,.field input:focus{border-color:var(--pri);border-width:2px;padding:13px 15px}
.sel-w{position:relative}
.sel-w::after{content:'\f107';font-family:'Font Awesome 6 Free';font-weight:900;position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--on-srf-v);font-size:12px;pointer-events:none}
.key-w{position:relative}
.key-w input{padding-right:44px}
.key-tog{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:36px;height:36px;border:none;background:transparent;color:var(--on-srf-v);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s}
.key-tog:hover{background:var(--st-l)}.key-tog:active{background:var(--st-h)}
.key-hint{font-size:11px;margin-top:6px;padding-left:12px;display:flex;align-items:center;gap:5px;transition:color .3s}
.key-hint.ok{color:var(--pri)}.key-hint.no{color:var(--on-srf-v)}
.key-hint i{font-size:10px}
.rng-row{display:flex;align-items:center;gap:14px;padding:4px 0}
input[type=range]{flex:1;height:16px;appearance:none;-webkit-appearance:none;background:transparent;outline:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:var(--out-v);transition:background .3s}
input[type=range]::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:20px;height:20px;margin-top:-8px;background:var(--pri);border:none;border-radius:50%;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.15);transition:transform .12s;-webkit-tap-highlight-color:transparent}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.15)}
input[type=range]::-moz-range-track{height:4px;border-radius:2px;background:var(--out-v);border:none}
input[type=range]::-moz-range-thumb{width:20px;height:20px;background:var(--pri);border:none;border-radius:50%;cursor:pointer}
.rv{font-size:14px;font-weight:600;min-width:48px;text-align:right;font-variant-numeric:tabular-nums;color:var(--pri)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;background:var(--pri-c);color:var(--on-pri-c);margin-bottom:14px;transition:background .3s,color .3s}
.chip i{font-size:11px}
.btn-tonal{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:20px;font-family:inherit;font-size:13px;font-weight:500;background:var(--sec-c);color:var(--on-sec-c);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:filter .15s}
.btn-tonal:active{filter:brightness(.92)}.btn-tonal i{font-size:12px}
.meta{font-size:12px;color:var(--on-srf-v);margin-top:12px;font-variant-numeric:tabular-nums;line-height:1.7}
.meta .hi{color:var(--pri);font-weight:500}
.pvg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pvi{text-align:center}
.pvl{font-size:11px;font-weight:500;color:var(--on-srf-v);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.pvi canvas{width:100%;height:auto;display:block;border-radius:8px;border:1px solid var(--out-v);background:var(--cvbg);transition:border-color .3s,background .3s;cursor:zoom-in}
.pvi canvas:active{transform:scale(.97)}
.crev{animation:crv .45s cubic-bezier(.2,0,0,1)}
@keyframes crv{from{opacity:.2;filter:blur(8px)}to{opacity:1;filter:none}}
.gl{padding-left:18px;font-size:12px;color:var(--on-srf-v);line-height:1.8}
.bbar{flex-shrink:0;position:fixed;bottom:0;left:0;right:0;padding:8px 16px;padding-bottom:max(8px,env(safe-area-inset-bottom));background:var(--srf-c);border-top:1px solid var(--out-v);display:flex;gap:8px;z-index:10;transition:background .3s,border-color .3s}
.btn-f{flex:1;padding:13px 10px;border:none;border-radius:20px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;background:var(--pri);color:var(--on-pri);position:relative;overflow:hidden;transition:box-shadow .15s;-webkit-tap-highlight-color:transparent}
.btn-f:hover{box-shadow:0 1px 3px 1px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.12)}.btn-f:active{box-shadow:none}
.btn-f:disabled{background:var(--out-v);color:var(--out);cursor:not-allowed;box-shadow:none}
.btn-o{flex:1;padding:13px 10px;border:1px solid var(--out);border-radius:20px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;background:transparent;color:var(--pri);position:relative;overflow:hidden;transition:background .15s;-webkit-tap-highlight-color:transparent}
.btn-o:hover{background:var(--st-l)}.btn-o:active{background:var(--st-h)}
.btn-o:disabled{border-color:var(--out-v);color:var(--out);cursor:not-allowed;background:transparent}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-12px);background:var(--inv-srf);color:var(--inv-on-srf);padding:10px 24px;font-size:13px;font-family:inherit;font-weight:500;border-radius:8px;opacity:0;transition:all .25s cubic-bezier(.2,0,0,1);z-index:99;pointer-events:none;white-space:nowrap;box-shadow:0 3px 12px rgba(0,0,0,.15)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.prc{position:fixed;inset:0;background:var(--scrim);display:none;align-items:center;justify-content:center;z-index:50}
.prc.on{display:flex}
.prc-inner{display:flex;flex-direction:column;align-items:center;gap:12px}
.spin{width:24px;height:24px;border:3px solid var(--out-v);border-top-color:var(--pri);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.prg{width:200px;height:4px;background:var(--out-v);border-radius:2px;overflow:hidden}
.prg-bar{height:100%;background:var(--pri);border-radius:2px;width:0%;transition:width .15s}
.prg-txt{font-size:13px;font-weight:500;color:#fff;font-variant-numeric:tabular-nums}
.modal{position:fixed;inset:0;background:var(--scrim);z-index:55;display:none;align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.modal-body{background:var(--srf-cl);border-radius:20px 20px 0 0;padding:20px 20px max(20px,env(safe-area-inset-bottom));width:100%;max-width:480px;animation:mup .3s cubic-bezier(.2,0,0,1);transition:background .3s}
@keyframes mup{from{transform:translateY(100%)}to{transform:none}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-hd span{font-size:16px;font-weight:600;color:var(--on-srf)}
.modal-close{width:32px;height:32px;border:none;border-radius:16px;background:transparent;color:var(--on-srf-v);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .15s}
.modal-close:hover{background:var(--st-l)}.modal-close:active{background:var(--st-h)}
.set-item{display:flex;align-items:center;justify-content:space-between;gap:16px}
.set-label{font-size:14px;font-weight:500;color:var(--on-srf)}
.set-desc{font-size:12px;color:var(--on-srf-v);margin-top:2px}
.toggle{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--out-v);border-radius:12px;transition:background .2s;cursor:pointer}
.toggle-track::before{content:'';position:absolute;left:2px;top:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.toggle-track{background:var(--pri)}
.toggle input:checked+.toggle-track::before{transform:translateX(20px)}
.lb{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:60;display:none;align-items:center;justify-content:center;cursor:zoom-out;-webkit-tap-highlight-color:transparent}
.lb.on{display:flex}
.lb img{max-width:95vw;max-height:92vh;object-fit:contain;border-radius:4px;animation:lbi .25s ease}
@keyframes lbi{from{transform:scale(.92);opacity:0}to{transform:none;opacity:1}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media(max-width:360px){.bbar{gap:5px}.btn-f,.btn-o{padding:12px 6px;font-size:13px}}
</style>
</head>
<body>
<header class="topbar">
  <h1>图像混淆工具</h1>
  <div class="sub">选择算法 · 输入密钥 · 一键混淆</div>
  <div class="topbar-actions">
    <button class="ibtn" id="setBtn" aria-label="设置"><i class="fa-solid fa-gear"></i></button>
    <button class="ibtn" id="cBtn" aria-label="选择颜色"><i class="fa-solid fa-palette"></i></button>
    <button class="ibtn" id="dkBtn" aria-label="切换深色模式"><i class="fa-solid fa-moon"></i></button>
  </div>
  <div class="cpanel" id="cPn"></div>
</header>
<main class="content">
  <section class="card">
    <div class="upl idle" id="up" role="button" tabindex="0" aria-label="上传图片">
      <input type="file" id="fi" accept="image/*">
      <div class="ico"><i class="fa-regular fa-image"></i></div>
      <div id="ut">点击或拖拽上传图片</div>
    </div>
  </section>
  <section class="card">
    <div class="ct"><i class="fa-solid fa-shuffle"></i>混淆参数</div>
    <div class="chip" id="aTag"><i class="fa-solid fa-bezier-curve"></i>Hilbert 曲线</div>
    <div class="field">
      <label>混淆算法</label>
      <div class="sel-w">
        <select id="algo">
          <option value="hilbert">Hilbert 曲线</option>
          <option value="gilbert">Gilbert 曲线像素位移</option>
          <option value="gilbert_golden">Gilbert + 黄金分割</option>
          <option value="zorder">Z-order 曲线</option>
          <option value="snake">蛇形扫描</option>
          <option value="spiral">螺旋扫描</option>
          <option value="random">随机置换</option>
          <option value="arnold">Arnold 变换</option>
          <option value="reverse">逆序扫描</option>
          <option value="diagonal">对角线扫描</option>
          <option value="rowshift">行循环移位</option>
          <option value="fibonacci">Fibonacci 置换</option>
          <option value="graycode">Gray Code 编码</option>
          <option value="bitrev">位序翻转</option>
          <option value="cantor">Cantor 配对</option>
          <option value="chaos_pair">混沌配对交换</option>
          <option value="baker">Baker 映射</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>加密密钥</label>
      <div class="key-w">
        <input type="password" id="ki" placeholder="留空则无密钥保护" autocomplete="off">
        <button class="key-tog" id="kTog" type="button" aria-label="切换密钥可见"><i class="fa-solid fa-eye"></i></button>
      </div>
      <div class="key-hint no" id="kHint"><i class="fa-solid fa-unlock"></i>未设密钥，任何人可解混淆</div>
    </div>
    <div class="field">
      <label>像素块大小</label>
      <div class="rng-row">
        <input type="range" id="bs" min="2" max="64" value="12" step="2">
        <span class="rv" id="bsv">12px</span>
      </div>
    </div>
    <div style="margin-top:4px">
      <button class="btn-tonal" id="gBtn"><i class="fa-solid fa-wand-magic-sparkles"></i>黄金比例自动优化</button>
    </div>
    <div class="meta" id="meta"></div>
  </section>
  <section class="card" id="pvC" style="display:none">
    <div class="ct"><i class="fa-solid fa-eye"></i>预览对比 <span style="font-size:11px;font-weight:400;color:var(--on-srf-v);margin-left:auto">点击可放大</span></div>
    <div class="pvg">
      <div class="pvi"><div class="pvl">原图</div><canvas id="cvO"></canvas></div>
      <div class="pvi"><div class="pvl">结果</div><canvas id="cvR"></canvas></div>
    </div>
  </section>
  <section class="card">
    <div class="ct"><i class="fa-solid fa-circle-info"></i>使用说明</div>
    <ol class="gl">
      <li>选择要处理的图片</li>
      <li>输入密钥保护图像（留空则无保护，任何人可还原）</li>
      <li>选择算法并调整块大小</li>
      <li>解混淆时必须选择相同算法、相同块大小、输入相同密钥</li>
      <li>导出 PNG 格式，无压缩损失</li>
    </ol>
  </section>
</main>
<nav class="bbar" aria-label="操作栏">
  <button class="btn-f" id="bE" disabled>混淆</button>
  <button class="btn-f" id="bD" disabled>解混淆</button>
  <button class="btn-o" id="bS" disabled>下载</button>
</nav>
<div class="prc" id="prc">
  <div class="prc-inner">
    <div class="spin" id="prcSpin"></div>
    <div class="prg" id="prgW" style="display:none"><div class="prg-bar" id="prgBar"></div></div>
    <div class="prg-txt" id="prgTxt" style="display:none">0%</div>
  </div>
</div>
<div class="toast" id="tt"></div>
<div class="modal" id="setModal">
  <div class="modal-body">
    <div class="modal-hd"><span>设置</span><button class="modal-close" id="setClose"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="set-item">
      <div><div class="set-label">分块处理</div><div class="set-desc">显示实时进度条，低性能设备推荐开启</div></div>
      <label class="toggle"><input type="checkbox" id="chunkToggle"><span class="toggle-track"></span></label>
    </div>
  </div>
</div>
<div class="lb" id="lb"><img id="lbImg" alt="放大查看"></div>

<script>

function morton(x,y){var r=0;for(var i=0;i<16;i++){r|=((x>>i)&1)<<(2*i);r|=((y>>i)&1)<<(2*i+1)}return r}\n\
function gilb(o,x,y,w,h,f){if(w<=0||h<=0)return;if(w===1&&h===1){o.push([x,y]);return}if(w>=h){var hw=w>>1;if(f){gilb(o,x+hw,y,w-hw,h,!f);gilb(o,x,y,hw,h,!f)}else{gilb(o,x,y,hw,h,!f);gilb(o,x+hw,y,w-hw,h,!f)}}else{var hh=h>>1;if(f){gilb(o,x,y+hh,w,h-hh,!f);gilb(o,x,y,w,hh,!f)}else{gilb(o,x,y,w,hh,!f);gilb(o,x,y+hh,w,h-hh,!f)}}}\n\

function bitRev(n,bits){var r=0;for(var i=0;i<bits;i++)r|=((n>>i)&1)<<(bits-1-i);return r}\n\
function xorshift32(s){s^=s<<13;s^=s>>17;s^=s<<5;return s>>>0}\n\
function cpR(perm,px,res,cols,bs,w,dec,row){for(var col=0;col<cols;col++){var i=row*cols+col;var si=dec?perm[i]:i,di=dec?i:perm[i];var sx=(si%cols)*bs,sy=Math.floor(si/cols)*bs;var dx=(di%cols)*bs,dy=Math.floor(di/cols)*bs;for(var by=0;by<bs;by++){var sOff=((sy+by)*w+sx)*4,dOff=((dy+by)*w+dx)*4;res.set(px.subarray(sOff,sOff+bs*4),dOff)}}}\n\
var A={\n\

  rd.onload=function(e){
    var img=new Image();
    img.onerror=function(){UI.toast('图片加载失败');$('ut').textContent='点击或拖拽上传图片';$('up').classList.add('idle')};
    img.onload=function(){
      var MX=4096,w=img.width,h=img.height;
      if(w>MX||h>MX){var sc=MX/Math.max(w,h);w=Math.round(w*sc);h=Math.round(h*sc)}
      var tmp=document.createElement('canvas');tmp.width=w;tmp.height=h;
      tmp.getContext('2d').drawImage(img,0,0,w,h);
      srcImg=tmp;Process.setResult(false);
      $('cvO').width=w;$('cvO').height=h;$('cvO').getContext('2d').drawImage(tmp,0,0);
      $('cvR').width=w;$('cvR').height=h;
      var c=$('cvR').getContext('2d');
      c.fillStyle=getComputedStyle(_root).getPropertyValue('--cvbg').trim()||'#f2f5f2';
      c.fillRect(0,0,w,h);
      c.fillStyle=getComputedStyle(_root).getPropertyValue('--out-v').trim()||'#bfc9c4';
      c.font='500 12px "Noto Sans SC",system-ui';c.textAlign='center';c.textBaseline='middle';
      c.fillText('等待处理',w/2,h/2);
      var nm=file.name.length>26?file.name.slice(0,23)+'...':file.name;
      $('ut').innerHTML='<span class="nm">'+nm+'</span><div class="sb">'+w+' \u00d7 '+h+'</div>';
      $('pvC').style.display='';$('bE').disabled=false;$('bD').disabled=false;$('bS').disabled=true;
      UI.updateMeta();
    };img.src=e.target.result;
  };rd.readAsDataURL(file);
}
return{init:function(){
  var $up=$('up'),$fi=$('fi');
  $up.addEventListener('click',function(){$fi.click()});
  $up.addEventListener('keydown',function(e){if(e.key==='Enter')$fi.click()});
  $up.addEventListener('dragover',function(e){e.preventDefault();$up.classList.add('over')});
  $up.addEventListener('dragleave',function(){$up.classList.remove('over')});
  $up.addEventListener('drop',function(e){e.preventDefault();$up.classList.remove('over');if(e.dataTransfer.files.length)loadFile(e.dataTransfer.files[0])});
  $fi.addEventListener('change',function(){if($fi.files.length)loadFile($fi.files[0]);$fi.value=''});
},getSrc:function(){return srcImg}};
})();

var Process=(function(){
var hasResult=false,rid=0,pW=0,pH=0;
var wURL=URL.createObjectURL(new Blob([W_CODE],{type:'text/javascript'}));
var worker=new Worker(wURL);
worker.onmessage=function(e){
  var d=e.data;if(d.rid!==rid)return;
  if(d.type==='progress'){$('prgBar').style.width=d.pct+'%';$('prgTxt').textContent=d.pct+'%';return}
  if(d.type==='err'){UI.toast(d.msg);unlock();return}
  var cvR=$('cvR');cvR.width=pW;cvR.height=pH;
  cvR.getContext('2d').putImageData(new ImageData(new Uint8ClampedArray(d.buf),pW,pH),0,0);
  hasResult=true;$('bS').disabled=false;
  cvR.classList.remove('crev');void cvR.offsetWidth;cvR.classList.add('crev');
  UI.toast('处理完成');unlock();
};
worker.onerror=function(){UI.toast('处理出错');unlock()};
function unlock(){$('bE').disabled=false;$('bD').disabled=false;$('prc').classList.remove('on')}
function getKeyHash(){var k=$('ki').value;return k?fnv1a(k):0}
function run(dec){
  var srcImg=Upload.getSrc();if(!srcImg)return;
  var src=(dec&&hasResult)?$('cvR'):srcImg;
  var w=src.width,h=src.height;
  var buf=src.getContext('2d').getImageData(0,0,w,h).data.buffer.slice(0);
  var chunk=$('chunkToggle').checked;
  rid++;pW=w;pH=h;
  if(chunk){$('prcSpin').style.display='none';$('prgW').style.display='';$('prgTxt').style.display='';$('prgBar').style.width='0%';$('prgTxt').textContent='0%'}
  else{$('prcSpin').style.display='';$('prgW').style.display='none';$('prgTxt').style.display='none'}
  $('bE').disabled=true;$('bD').disabled=true;$('prc').classList.add('on');
  worker.postMessage({buf:buf,w:w,h:h,bs:+$('bs').value,algo:$('algo').value,seed:getKeyHash(),dec:dec,rid:rid,chunk:chunk},[buf]);
}
function download(){if(!hasResult)return;var a=document.createElement('a');a.download='scrambled.png';a.href=$('cvR').toDataURL('image/png');a.click();UI.toast('已保存')}
return{init:function(){$('bE').addEventListener('click',function(){run(false)});$('bD').addEventListener('click',function(){run(true)});$('bS').addEventListener('click',download)},setResult:function(v){hasResult=v},hasResult:function(){return hasResult}};
})();

var Lightbox=(function(){
return{init:function(){
  var lb=$('lb'),img=$('lbImg'),ids=['cvO','cvR'];
  for(var i=0;i<ids.length;i++){(function(id){$(id).addEventListener('click',function(){if(id==='cvR'&&!Process.hasResult())return;img.src=$(id).toDataURL('image/png');lb.classList.add('on')})})(ids[i])}
  lb.addEventListener('click',function(){lb.classList.remove('on')});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'){lb.classList.remove('on');$('setModal').classList.remove('on')}});
}};
})();

var Settings=(function(){
return{init:function(){
  $('chunkToggle').checked=lsGet('isc-chunk','0')==='1';
  $('chunkToggle').addEventListener('change',function(){lsSet('isc-chunk',this.checked?'1':'0')});
  $('setBtn').addEventListener('click',function(e){e.stopPropagation();$('setModal').classList.add('on');$('cPn').classList.remove('open')});
  $('setClose').addEventListener('click',function(){$('setModal').classList.remove('on')});
  $('setModal').addEventListener('click',function(e){if(e.target===$('setModal'))$('setModal').classList.remove('on')});
}};
})();

var UI=(function(){
var _tt=0,kvis=false;
function toast(m){var $tt=$('tt');$tt.textContent=m;$tt.classList.add('on');clearTimeout(_tt);_tt=setTimeout(function(){$tt.classList.remove('on')},2200)}
function updateMeta(){
  var s=Upload.getSrc();if(!s){$('meta').textContent='';return}
  var b=+$('bs').value,c=Math.floor(s.width/b),r=Math.floor(s.height/b),a=$('algo').value,k=$('ki').value;
  var lock=k?'<span class="hi"><i class="fa-solid fa-lock" style="font-size:10px"></i> 已加密</span>':'<span style="color:var(--on-srf-v)">未加密</span>';
  $('meta').innerHTML=s.width+' \u00d7 '+s.height+' \u00b7 '+c+' \u00d7 '+r+' = <span class="hi">'+(c*r)+'</span> \u5757 \u00b7 '+lock+'<br><span class="hi">'+(Meta.desc[a]||'')+'</span>';
}
function updateKeyHint(){
  var k=$('ki').value,h=$('kHint');
  if(k){h.className='key-hint ok';h.innerHTML='<i class="fa-solid fa-lock"></i>密钥保护已启用，解混淆需输入相同密钥'}
  else{h.className='key-hint no';h.innerHTML='<i class="fa-solid fa-unlock"></i>未设密钥，任何人可解混淆'}
  updateMeta();
}
function updateAlgoTag(){var v=$('algo').value;$('aTag').innerHTML='<i class="fa-solid '+Meta.icon[v]+'"></i>'+Meta.label[v]}
function goldenOptimize(){
  if(!Upload.getSrc()){toast('请先上传图片');return}
  var phi=(1+Math.sqrt(5))/2,w=Upload.getSrc().width,h=Upload.getSrc().height;
  var minB=2,maxB=Math.min(64,Math.floor(Math.min(w,h)/4));
  if(maxB<=minB){toast('图片尺寸过小');return}
  var bs=Math.round(minB+(maxB-minB)*(1-1/phi));
  bs=Math.max(minB,bs-(bs%2));if(bs<minB)bs=minB;
  $('bs').value=bs;$('bsv').textContent=bs+'px';updateMeta();toast('参数已优化');
}
return{init:function(){
  $('bs').addEventListener('input',function(){$('bsv').textContent=$('bs').value+'px';updateMeta()});
  $('algo').addEventListener('change',function(){updateAlgoTag();updateMeta()});
  $('gBtn').addEventListener('click',goldenOptimize);
  $('ki').addEventListener('input',updateKeyHint);
  $('kTog').addEventListener('click',function(){kvis=!kvis;$('ki').type=kvis?'text':'password';$('kTog').innerHTML=kvis?'<i class="fa-solid fa-eye-slash"></i>':'<i class="fa-solid fa-eye"></i>'});
  updateAlgoTag();updateKeyHint();
},toast:toast,updateMeta:updateMeta};
})();

Theme.init();Upload.init();Process.init();Lightbox.init();Settings.init();UI.init();
</script>
</body>
</html>
